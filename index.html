            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Container */
        .chat-wrap {
            width: 100%;
            max-width: 820px;
            height: 90vh;
            max-height: 860px;
            background: var(--white);
            border-radius: 20px;
            box-shadow: 0 24px 80px rgba(27,54,40,.20), 0 4px 16px rgba(0,0,0,.06);

            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        .chat-header {
            background: var(--green-dark);
            padding: 18px 24px;
            display: flex;
            align-items: center;
            gap: 14px;
            flex-shrink: 0;
        }
        .hdr-icon {
            width: 46px; height: 46px;
            background: var(--gold);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; flex-shrink: 0;
        }
        .hdr-text h1 { color: #fff; font-size: 17px; font-weight: 600; letter-spacing: -.2px; }
        .hdr-text p  { color: rgba(255,255,255,.65); font-size: 12.5px; margin-top: 2px; }
        .hdr-status  { margin-left: auto; display: flex; align-items: center; gap: 6px;

        .hdr-dot     { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; }

        /* Messages */
        .messages {
            flex: 1; overflow-y: auto;
            padding: 22px 20px;
            display: flex; flex-direction: column; gap: 14px;
            background: #FAFAF7;
        }
        .messages::-webkit-scrollbar { width: 4px; }
        .messages::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 2px; }

        .msg { display: flex; gap: 10px; max-width: 87%; }
        .msg.user { margin-left: auto; flex-direction: row-reverse; }

        .avatar {
            width: 34px; height: 34px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 15px; flex-shrink: 0; align-self: flex-end;
        }
        .avatar.bot  { background: var(--green-dark); color: var(--gold); }
        .avatar.user { background: var(--gold); color: var(--green-dark); }

        .bubble {
            padding: 11px 15px;
            border-radius: 16px;
            font-size: 14px; line-height: 1.65;
            color: var(--text);
        }
        .msg.bot  .bubble { background: #fff; border: 1px solid #E5E7EB; border-bottom-left-radius: 4px; }
        .msg.user .bubble { background: var(--green-dark); color: #fff; border-bottom-right-radius: 4px; }

        .bubble ul  { margin: 7px 0 7px 18px; }
        .bubble li  { margin: 3px 0; }
        .bubble ol  { margin: 7px 0 7px 18px; }
        .bubble p   { margin: 5px 0; }
        .bubble strong { font-weight: 600; }
        .bubble em { color: var(--gray); font-style: italic; }

        /* Info boxes */
        .box {
            border-left: 3px solid var(--green-mid);
            background: #F0F7F4;
            padding: 9px 13px; border-radius: 0 8px 8px 0;
            margin: 8px 0; font-size: 13.5px;
        }
        .box.gold   { background: #FDF8EC; border-left-color: var(--gold); }
        .box.amber  { background: #FFFBEB; border-left-color: #F59E0B; }

        /* Links inside bubbles */
        .bubble a { color: var(--green-mid); text-decoration: none; font-weight: 500; }
        .bubble a:hover { color: var(--gold); text-decoration: underline; }

        /* Quick replies */
        .qr-wrap { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 10px; }
        .qr-btn {
            padding: 7px 13px;
            background: #fff; border: 1.5px solid var(--green-mid);
            color: var(--green-mid); border-radius: 20px;
            cursor: pointer; font-size: 13px;
            transition: all .18s;
        }
        .qr-btn:hover { background: var(--green-mid); color: #fff; }
        .qr-btn:disabled { opacity: .45; cursor: default; }

        /* Typing */
        .typing-dots { display: flex; gap: 4px; padding: 10px 14px; }
        .dot { width: 8px; height: 8px; background: #9CA3AF; border-radius: 50%;
               animation: bounce 1.4s infinite ease-in-out; }
        .dot:nth-child(2) { animation-delay: .2s; }
        .dot:nth-child(3) { animation-delay: .4s; }
        @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-7px); } }

        /* Input */
        .input-bar {
            padding: 14px 18px;
            background: #fff;
            border-top: 1px solid #E5E7EB;
            display: flex; gap: 10px; align-items: flex-end;
            flex-shrink: 0;
        }
        .input-bar textarea {
            flex: 1;
            padding: 11px 16px;
            border: 1.5px solid #D1D5DB;
            border-radius: 22px;
            font-size: 14px; font-family: inherit;
            resize: none; outline: none; line-height: 1.5;
            max-height: 110px; overflow-y: auto;
            transition: border-color .2s;
        }
        .input-bar textarea:focus { border-color: var(--green-mid); }
        .send-btn {
            width: 42px; height: 42px; flex-shrink: 0;
            background: var(--green-dark); border: none; border-radius: 50%;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: background .2s;
        }
        .send-btn:hover { background: var(--green-mid); }
        .send-btn svg { width: 18px; height: 18px; fill: #fff; }

        /* Disclaimer */
        .disclaimer {
            text-align: center; font-size: 10.5px; color: #9CA3AF;
            padding: 7px 20px 9px; background: #fff;
            border-top: 1px solid #F3F4F6; flex-shrink: 0;
        }

        /* Responsive */
        @media (max-width: 600px) {
            body { padding: 0; }
            .chat-wrap { height: 100vh; border-radius: 0; max-height: none; }
            .msg { max-width: 93%; }
        }
    </style>
</head>

// =============================================
// FUZZY SEARCH SETUP
// =============================================
const searchItems = Object.entries(KB)
    .filter(([k]) => !['welcome','fallback'].includes(k))
    .map(([key, val]) => ({
        key,
        triggers: (val.t || []).join(' '),
        text: (val.text || '').replace(/<[^>]+>/g, ' ')
    }));

const fuse = new Fuse(searchItems, {
    keys: ['triggers','text'],
    threshold: 0.38,
    includeScore: true
});

// =============================================
// INTENT DETECTION
// =============================================
function getIntent(raw) {
    const msg = raw.toLowerCase().trim();

    // Escalation
    if (/complaint|complain|upset|problem with my account|technical issue|bug|broken|not working|urgent|emergency/.test(msg)) {
        return 'escalate';
    }

    // Exact trigger scan
    for (const [key, val] of Object.entries(KB)) {
        if (!val.t) continue;
        for (const trigger of val.t) {
            if (msg.includes(trigger)) return key;
        }
    }

    // Fuse fallback
    const results = fuse.search(msg);
    if (results.length > 0 && results[0].score < 0.45) {
        return results[0].item.key;
    }

    return 'fallback';
}

function buildReply(intent) {
    if (intent === 'escalate') {
        return {
            text: `I'm sorry to hear you're experiencing an issue. For complaints or urgent account problems, please reach our team directly:<br><br>
<ul>
  <li>📞 <strong>(480) 867-2100</strong></li>
  <li>📧 <a href="mailto:relationships@monetary-metals.com">relationships@monetary-metals.com</a></li>
  <li>📅 <a href="https://www.monetary-metals.com/contact-us/" target="_blank">Schedule a call →</a></li>
</ul>
A team member will be happy to assist you promptly.`,
            fup: null, qr: []
        };
    }
    const r = KB[intent] || KB.fallback;
    return {
        text: r.text,
        fup: r.fup || null,
        qr: r.qr || []
    };
}

// =============================================
// UI
// =============================================
const msgsEl = document.getElementById('msgs');
const inp    = document.getElementById('inp');
const btn    = document.getElementById('sendBtn');

function scrollBottom() { msgsEl.scrollTop = msgsEl.scrollHeight; }

function addMsg(html, isUser) {
    const wrap = document.createElement('div');
    wrap.className = 'msg ' + (isUser ? 'user' : 'bot');

    const av = document.createElement('div');
    av.className = 'avatar ' + (isUser ? 'user' : 'bot');
    av.textContent = isUser ? '👤' : '⚜';

    const bub = document.createElement('div');
    bub.className = 'bubble';
    bub.innerHTML = html;

    wrap.appendChild(av);
    wrap.appendChild(bub);
    msgsEl.appendChild(wrap);
    scrollBottom();
    return bub;
}

function addQRs(bub, replies) {
    if (!replies || replies.length === 0) return;
    const wrap = document.createElement('div');
    wrap.className = 'qr-wrap';
    replies.forEach(r => {
        const b = document.createElement('button');
        b.className = 'qr-btn';
        b.textContent = r;
        b.addEventListener('click', () => {
            wrap.querySelectorAll('.qr-btn').forEach(x => x.disabled = true);
            send(r);
        });
        wrap.appendChild(b);
    });
    bub.appendChild(wrap);
    scrollBottom();
}

function showTyping() {
    const wrap = document.createElement('div');
    wrap.className = 'msg bot';
    wrap.id = 'typing';
    wrap.innerHTML = `<div class="avatar bot">⚜</div>
        <div class="bubble"><div class="typing-dots">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div></div>`;
    msgsEl.appendChild(wrap);
    scrollBottom();
    return wrap;
}

function send(text) {
    const msg = text || inp.value.trim();
    if (!msg) return;

    addMsg(msg, true);
    if (!text) { inp.value = ''; inp.style.height = 'auto'; }
    scrollBottom();

    const typing = showTyping();
    setTimeout(() => {
        typing.remove();
        const intent = getIntent(msg);
        const reply  = buildReply(intent);
        const fullText = reply.fup
            ? reply.text + `<br><br><em>${reply.fup}</em>`
            : reply.text;
        const bub = addMsg(fullText, false);
        addQRs(bub, reply.qr);
    }, 700 + Math.random() * 500);
}

// Events
btn.addEventListener('click', () => send());
inp.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
inp.addEventListener('input', () => {
    inp.style.height = 'auto';
    inp.style.height = inp.scrollHeight + 'px';
});

// Welcome message on load
setTimeout(() => {
    const w = KB.welcome;
    const bub = addMsg(w.text, false);
    addQRs(bub, w.qr);
}, 350);
</script>
